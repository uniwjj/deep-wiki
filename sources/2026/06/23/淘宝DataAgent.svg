  <text x="29" y="500" font-size="16" font-weight="bold" fill="#1d39c4" writing-mode="vertical-rl" letter-spacing="4">红线</text>
  <text x="36" y="650" font-size="16" font-weight="bold" fill="#1d39c4" writing-mode="vertical-rl" letter-spacing="4">踩坑</text>
