<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;">
  <defs>
    <!-- 箭头定义 -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8c8c8c" />
    </marker>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.05" />
    </filter>
  </defs>

  <!-- ==================== Applications 层 ==================== -->
  <g id="applications-layer">
    <!-- BI Dashboards -->
    <rect x="20" y="20" width="270" height="130" rx="15" fill="#f9fdf9" stroke="#5cb85c" stroke-width="2" filter="url(#shadow)"/>
    <text x="40" y="50" font-size="18" font-weight="bold" fill="#3c763d">BI Dashboards</text>
    <circle cx="35" cy="70" r="3" fill="#3c763d" />
    <text x="45" y="75" font-size="14" fill="#555">FBI / QuickBI / 大屏</text>
    <circle cx="35" cy="95" r="3" fill="#3c763d" />
    <text x="45" y="100" font-size="14" fill="#555">移动端驾驶舱</text>

    <!-- AI Skills -->
    <rect x="310" y="20" width="270" height="130" rx="15" fill="#f0f5fa" stroke="#5bc0de" stroke-width="2" filter="url(#shadow)"/>
    <text x="330" y="50" font-size="18" font-weight="bold" fill="#31708f">AI Skills</text>
    <circle cx="325" cy="70" r="3" fill="#31708f" />
    <text x="335" y="75" font-size="14" fill="#555">OSI/WIKI</text>
    <circle cx="325" cy="95" r="3" fill="#31708f" />
    <text x="335" y="100" font-size="14" fill="#555">分析思路、可视化、鉴权</text>

    <!-- AI Reports -->
    <rect x="600" y="20" width="270" height="130" rx="15" fill="#fcf2fa" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="620" y="50" font-size="18" font-weight="bold" fill="#a94442">AI Reports</text>
    <circle cx="615" cy="70" r="3" fill="#a94442" />
    <text x="625" y="75" font-size="14" fill="#555">经营决策性分析</text>
    <circle cx="615" cy="95" r="3" fill="#a94442" />
    <text x="625" y="100" font-size="14" fill="#555">智能解读、定期推送</text>

    <!-- System Apps -->
    <rect x="890" y="20" width="270" height="130" rx="15" fill="#fff5ef" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="910" y="50" font-size="18" font-weight="bold" fill="#ec971f">System Apps</text>
    <circle cx="905" cy="70" r="3" fill="#ec971f" />
    <text x="915" y="75" font-size="14" fill="#555">营销圈人发券</text>
    <circle cx="905" cy="95" r="3" fill="#ec971f" />
    <text x="915" y="100" font-size="14" fill="#555">异常波动智能告警</text>
  </g>

  <!-- 箭头 1 -->
  <line x1="600" y1="160" x2="600" y2="185" stroke="#8c8c8c" stroke-width="3" marker-end="url(#arrow)" />

  <!-- ==================== Data Mesh 层 ==================== -->
  <g id="data-mesh-layer">
    <!-- 主容器 -->
    <rect x="10" y="195" width="1180" height="560" rx="15" fill="#fbfbfb" stroke="#e1e4e8" stroke-width="2" filter="url(#shadow)"/>
    <text x="30" y="225" font-size="22" font-weight="bold" fill="#333">Data Mesh</text>
    
    <!-- ADM 模块 -->
    <!-- ADM 1 -->
    <rect x="25" y="245" width="270" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="40" y="270" font-size="15" font-weight="bold" fill="#333">ADM 供应链履约效率分析</text>
    <text x="40" y="292" font-size="13" fill="#666">OKR/KPI、过程指标计算</text>
    <text x="40" y="312" font-size="13" fill="#666">看板、预警分析</text>

    <!-- ADM 2 -->
    <rect x="310" y="245" width="270" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="325" y="270" font-size="15" font-weight="bold" fill="#333">ADM 财务经营损益分析</text>
    <text x="325" y="292" font-size="13" fill="#666">OKR/KPI、过程指标计算</text>
    <text x="325" y="312" font-size="13" fill="#666">实时看板、预警分析</text>

    <!-- ADM 3 -->
    <rect x="595" y="245" width="270" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="610" y="270" font-size="15" font-weight="bold" fill="#333">ADM 销售转化分析</text>
    <text x="610" y="292" font-size="13" fill="#666">OKR/KPI 指标计算</text>
    <text x="610" y="312" font-size="13" fill="#666">实时看板、预警分析</text>

    <!-- ADM 4 -->
    <rect x="880" y="245" width="270" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="895" y="270" font-size="15" font-weight="bold" fill="#333">ADM 公司级 ORK 指标分析</text>
    <text x="895" y="292" font-size="13" fill="#666">OKR/KPI 指标计算</text>
    <text x="895" y="312" font-size="13" fill="#666">实时看板、预警分析</text>

    <!-- 数据域 -->
    <!-- 交易数据域 -->
    <g id="domain-trade">
      <rect x="25" y="350" width="370" height="380" rx="20" fill="#f2f9fc" stroke="#4cb3e6" stroke-width="2" filter="url(#shadow)"/>
      <text x="45" y="380" font-size="18" font-weight="bold" fill="#1a6999">交易数据域</text>
      <text x="45" y="405" font-size="14" fill="#555">交易 · 订单 · 支付 · 退款</text>

      <!-- CDM -->
      <rect x="35" y="420" width="175" height="180" rx="10" fill="#f1f9f5" stroke="#5cb85c" stroke-width="2"/>
      <text x="45" y="445" font-size="14" font-weight="bold" fill="#3c763d">CDM 公共数据模型</text>
      <circle cx="45" cy="465" r="3" fill="#5cb85c" />
      <text x="55" y="470" font-size="12" fill="#555">DWD 明细事实表</text>
      <circle cx="45" cy="485" r="3" fill="#5cb85c" />
      <text x="55" y="490" font-size="12" fill="#555">DWS 轻度聚合汇总</text>
      <circle cx="45" cy="505" r="3" fill="#5cb85c" />
      <text x="55" y="510" font-size="12" fill="#555">DIM 维度表</text>

      <!-- WIKI -->
      <rect x="220" y="420" width="165" height="135" rx="10" fill="#fcf2fa" stroke="#d9534f" stroke-width="2"/>
      <text x="230" y="445" font-size="14" font-weight="bold" fill="#a94442">WIKI</text>
      <circle cx="230" cy="460" r="3" fill="#d9534f" />
      <text x="240" y="465" font-size="12" fill="#555">表知识定义</text>
      <circle cx="230" cy="478" r="3" fill="#d9534f" />
      <text x="240" y="483" font-size="12" fill="#555">概念+实体</text>
      <circle cx="230" cy="496" r="3" fill="#d9534f" />
      <text x="240" y="501" font-size="12" fill="#555">指标层次关系</text>
      <circle cx="230" cy="514" r="3" fill="#d9534f" />
      <text x="240" y="519" font-size="12" fill="#555">文档</text>
      <circle cx="230" cy="532" r="3" fill="#d9534f" />
      <text x="240" y="537" font-size="12" fill="#555">知识图谱构建</text>

      <!-- ODS -->
      <rect x="35" y="615" width="350" height="100" rx="10" fill="#fff5ef" stroke="#f0ad4e" stroke-width="2"/>
      <text x="45" y="640" font-size="14" font-weight="bold" fill="#ec971f">ODS 源数据层</text>
      <circle cx="45" cy="660" r="3" fill="#f0ad4e" />
      <text x="55" y="665" font-size="12" fill="#555">数据镜像/原始数据</text>
      <circle cx="45" cy="680" r="3" fill="#f0ad4e" />
      <text x="55" y="685" font-size="12" fill="#555">CDC同步·增量捕获</text>
    </g>

    <!-- 物流数据域 -->
    <g id="domain-logistics">
      <rect x="415" y="350" width="370" height="380" rx="20" fill="#f5fbf5" stroke="#85c285" stroke-width="2" filter="url(#shadow)"/>
      <text x="435" y="380" font-size="18" font-weight="bold" fill="#3b7a3b">物流数据域</text>
      <text x="435" y="405" font-size="14" fill="#555">仓储 · 配送 · 路由 · 时效</text>

      <!-- CDM -->
      <rect x="425" y="420" width="175" height="180" rx="10" fill="#f1f9f5" stroke="#5cb85c" stroke-width="2"/>
      <text x="435" y="445" font-size="14" font-weight="bold" fill="#3c763d">CDM 公共数据模型</text>
      <circle cx="435" cy="465" r="3" fill="#5cb85c" />
      <text x="445" y="470" font-size="12" fill="#555">DWD 明细事实表</text>
      <circle cx="435" cy="485" r="3" fill="#5cb85c" />
      <text x="445" y="490" font-size="12" fill="#555">DWS 轻度聚合汇总</text>
      <circle cx="435" cy="505" r="3" fill="#5cb85c" />
      <text x="445" y="510" font-size="12" fill="#555">DIM 维度表</text>

      <!-- WIKI -->
      <rect x="610" y="420" width="165" height="135" rx="10" fill="#fcf2fa" stroke="#d9534f" stroke-width="2"/>
      <text x="620" y="445" font-size="14" font-weight="bold" fill="#a94442">WIKI</text>
      <circle cx="620" cy="460" r="3" fill="#d9534f" />
      <text x="630" y="465" font-size="12" fill="#555">表知识定义</text>
      <circle cx="620" cy="478" r="3" fill="#d9534f" />
      <text x="630" y="483" font-size="12" fill="#555">概念+实体</text>
      <circle cx="620" cy="496" r="3" fill="#d9534f" />
      <text x="630" y="501" font-size="12" fill="#555">指标层次关系</text>
      <circle cx="620" cy="514" r="3" fill="#d9534f" />
      <text x="630" y="519" font-size="12" fill="#555">文档</text>
      <circle cx="620" cy="532" r="3" fill="#d9534f" />
      <text x="630" y="537" font-size="12" fill="#555">知识图谱构建</text>

      <!-- ODS -->
      <rect x="425" y="615" width="350" height="100" rx="10" fill="#fff5ef" stroke="#f0ad4e" stroke-width="2"/>
      <text x="435" y="640" font-size="14" font-weight="bold" fill="#ec971f">ODS 源数据层</text>
      <circle cx="435" cy="660" r="3" fill="#f0ad4e" />
      <text x="445" y="665" font-size="12" fill="#555">数据镜像/原始数据</text>
      <circle cx="435" cy="680" r="3" fill="#f0ad4e" />
      <text x="445" y="685" font-size="12" fill="#555">CDC同步·增量捕获</text>
    </g>

    <!-- LLM数据域 -->
    <g id="domain-llm">
      <rect x="805" y="350" width="370" height="380" rx="20" fill="#f0f5fa" stroke="#5bc0de" stroke-width="2" filter="url(#shadow)"/>
      <text x="825" y="380" font-size="18" font-weight="bold" fill="#31708f">LLM数据域</text>
      <text x="825" y="405" font-size="14" fill="#555">订阅 · tokens · agents · 时效</text>

      <!-- CDM -->
      <rect x="815" y="420" width="175" height="180" rx="10" fill="#f1f9f5" stroke="#5cb85c" stroke-width="2"/>
      <text x="825" y="445" font-size="14" font-weight="bold" fill="#3c763d">CDM 公共数据模型</text>
      <circle cx="825" cy="465" r="3" fill="#5cb85c" />
      <text x="835" y="470" font-size="12" fill="#555">DWD 明细事实表</text>
      <circle cx="825" cy="485" r="3" fill="#5cb85c" />
      <text x="835" y="490" font-size="12" fill="#555">DWS 轻度聚合汇总</text>
      <circle cx="825" cy="505" r="3" fill="#5cb85c" />
      <text x="835" y="510" font-size="12" fill="#555">DIM 维度表</text>

      <!-- WIKI -->
      <rect x="1000" y="420" width="165" height="135" rx="10" fill="#fcf2fa" stroke="#d9534f" stroke-width="2"/>
      <text x="1010" y="445" font-size="14" font-weight="bold" fill="#a94442">WIKI</text>
      <circle cx="1010" cy="460" r="3" fill="#d9534f" />
      <text x="1020" y="465" font-size="12" fill="#555">表知识定义</text>
      <circle cx="1010" cy="478" r="3" fill="#d9534f" />
      <text x="1020" y="483" font-size="12" fill="#555">概念+实体</text>
      <circle cx="1010" cy="496" r="3" fill="#d9534f" />
      <text x="1020" y="501" font-size="12" fill="#555">指标层次关系</text>
      <circle cx="1010" cy="514" r="3" fill="#d9534f" />
      <text x="1020" y="519" font-size="12" fill="#555">文档</text>
      <circle cx="1010" cy="532" r="3" fill="#d9534f" />
      <text x="1020" y="537" font-size="12" fill="#555">知识图谱构建</text>

      <!-- ODS -->
      <rect x="815" y="615" width="350" height="100" rx="10" fill="#fff5ef" stroke="#f0ad4e" stroke-width="2"/>
      <text x="825" y="640" font-size="14" font-weight="bold" fill="#ec971f">ODS 源数据层</text>
      <circle cx="825" cy="660" r="3" fill="#f0ad4e" />
      <text x="835" y="665" font-size="12" fill="#555">数据镜像/原始数据</text>
      <circle cx="825" cy="680" r="3" fill="#f0ad4e" />
      <text x="835" y="685" font-size="12" fill="#555">CDC同步·增量捕获</text>
    </g>
  </g>

  <!-- 箭头 2 -->
  <line x1="600" y1="760" x2="600" y2="785" stroke="#8c8c8c" stroke-width="3" marker-end="url(#arrow)" />

  <!-- ==================== Source System 层 ==================== -->
  <g id="source-layer">
    <rect x="10" y="795" width="1180" height="135" rx="15" fill="#fbfbfb" stroke="#e1e4e8" stroke-width="2" filter="url(#shadow)"/>
    <text x="30" y="820" font-size="20" font-weight="bold" fill="#333">Source System</text>

    <!-- Source 1 -->
    <rect x="25" y="835" width="210" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="45" y="860" font-size="14" font-weight="bold" fill="#333">业务数据库</text>
    <text x="45" y="880" font-size="13" fill="#666">MySQL/PG/Oracle</text>

    <!-- Source 2 -->
    <rect x="250" y="835" width="210" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="860" font-size="14" font-weight="bold" fill="#333">日志/埋点</text>
    <text x="270" y="880" font-size="13" fill="#666">Flume/LogAgent</text>

    <!-- Source 3 -->
    <rect x="475" y="835" width="210" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="495" y="860" font-size="14" font-weight="bold" fill="#333">第三方 API</text>
    <text x="495" y="880" font-size="13" fill="#666">HTTP/RPC 拉取</text>

    <!-- Source 4 -->
    <rect x="700" y="835" width="210" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="720" y="860" font-size="14" font-weight="bold" fill="#333">文件/CSV</text>
    <text x="720" y="880" font-size="13" fill="#666">SFTP/OSS 导入</text>

    <!-- Source 5 -->
    <rect x="925" y="835" width="250" height="80" rx="10" fill="#ffffff" stroke="#d3d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="945" y="860" font-size="14" font-weight="bold" fill="#333">消息队列</text>
    <text x="945" y="880" font-size="13" fill="#666">Kafka/RocketMQ</text>
  </g>

</svg>
