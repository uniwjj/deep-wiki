<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%" style="background-color: #F8FAFC; font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;">
    <!-- 顶部蓝条 -->
    <rect x="20" y="20" width="1160" height="70" rx="8" fill="#1D4ED8"/>
    <text x="600" y="62" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DataAgent 入口 · 自然语言交互</text>

    <!-- 左侧 CLI 模式 -->
    <rect x="20" y="110" width="565" height="300" rx="12" fill="#2563EB"/>
    <text x="60" y="165" font-size="32" font-weight="bold" fill="#FFFFFF">CLI 模式</text>
    <text x="60" y="200" font-size="18" fill="#BFDBFE">代码 Agent · 自主交付</text>
    
    <text x="60" y="240" font-size="15" fill="#EFF6FF">
        在 CLI(主入口)与 IDE(融合)中自主完成代码任务 · 覆盖 SQL / Python / Notebook 端到
    </text>
    <text x="60" y="265" font-size="15" fill="#EFF6FF">端</text>

    <!-- 右侧 Claw 模式 -->
    <rect x="615" y="110" width="565" height="300" rx="12" fill="#EA580C"/>
    <text x="655" y="165" font-size="32" font-weight="bold" fill="#FFFFFF">Claw 模式</text>
    <text x="655" y="200" font-size="18" fill="#FED7AA">运维 Agent · 自主执行</text>
    
    <text x="655" y="240" font-size="15" fill="#FFF7ED">
        在 IM / 告警 / 任务流中自主完成运维任务 · 覆盖诊断 / 调度 / 治理
    </text>

    <!-- 底部上下文层 -->
    <rect x="20" y="430" width="1160" height="70" rx="8" fill="#E5E7EB"/>
    <text x="600" y="472" font-size="18" font-weight="bold" fill="#1F2937" text-anchor="middle">统一上下文层  数据语义 · 会话记忆 · 安全权限</text>
</svg>
